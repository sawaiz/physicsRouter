name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Unit tests
        run: pytest -q

      - name: Score regression (synthetic always; HALO if vendored)
        run: python scripts/ci_regression.py

      - name: Build demo dashboard + viewer data
        run: python scripts/build_viewer_demo.py

      - name: Upload demo artifacts
        uses: actions/upload-artifact@v4
        with:
          name: demo-viewer
          path: |
            examples/demo/
            viewer/
            docs/route_comparison.md
          if-no-files-found: warn
