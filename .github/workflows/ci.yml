name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Cache native build
        uses: actions/cache@v4
        with:
          path: native/build
          key: native-${{ runner.os }}-py3.11-${{ hashFiles('native/**/*.cpp', 'native/**/*.hpp', 'native/CMakeLists.txt', 'scripts/build_native.sh') }}

      - name: Build native C++ router core (required)
        run: bash scripts/build_native.sh

      - name: Unit tests
        run: pytest -q

      - name: Score regression (synthetic always; HALO if vendored)
        run: python scripts/ci_regression.py

      - name: Build demo dashboard + viewer data
        run: python scripts/build_viewer_demo.py

      - name: Upload demo artifacts
        uses: actions/upload-artifact@v4
        with:
          name: demo-viewer
          path: |
            examples/demo/
            viewer/
            docs/route_comparison.md
          if-no-files-found: warn
