# MPPC Interface v1.3 (commit 580c61d) — SiPM / muon telescope readout
# Source: https://github.com/muonTelescope/mppcInterface @ 580c61d
# PCB: mppcInterface_v1.3.kicad_pcb (pinned golden human route)
project_name: mppcInterface_v1.3
board_width_mm: 65
board_height_mm: 30
notes: |
  HEP SiPM/MPPC 8-channel interface (muonTelescope). Topologies related to
  sPHENIX-class bias + coincidence. Benchmark golden for topological autorouting.

nets:
  - name: GND
    weight: 5.0
    net_class: ground
  - name: "+3V3"
    weight: 4.5
    net_class: power
  - name: "+1V2"
    weight: 4.0
    net_class: power
  - name: "+5V-A"
    weight: 4.5
    net_class: power
  - name: "-5V"
    weight: 4.5
    net_class: power
  - name: HV
    weight: 5.0
    net_class: high_speed
    emi_sensitive: true
    notes: MPPC bias high voltage
  - name: SCLK
    weight: 3.2
    net_class: high_speed
  - name: MOSI
    weight: 3.2
    net_class: high_speed
  - name: MISO
    weight: 3.2
    net_class: high_speed

physics:
  weighted_wirelength: 1.0
  power_loop_area: 1.5
  critical_net_length: 1.4
  emi_proxy: 1.3
  spice_score: 1.2
  openems_score: 1.1
  return_path: 1.3
  loop_inductance: 1.2

use_spice: true
use_openems: true
