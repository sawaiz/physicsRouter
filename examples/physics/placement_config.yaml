- name: GND
  net_class: ground
  weight: 6.0
  critical: true
  max_length_mm: null
  target_impedance_ohm: null
  pair_with: null
  notes: System return — continuous ground, no split planes (DESIGN_RULES).
  power_loop_group: main_gnd
  simulate_spice: true
  simulate_em: false
  emi_sensitive: false
- name: VSYS
