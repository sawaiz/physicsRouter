project_name: muon3-physics
board_width_mm: 140.0
board_height_mm: 110.0
grid_mm: 0.5
notes: 'Muon3 / ../physics telescope board (v10 layout). Four-channel SiPM AFE (OPA858), LT3482 ~70 V
  HV, iCE40 FPGA, nRF9151 radio path, USB-C PD / VSYS power tree. Generous 140×110 mm outline with functional
  regions: left SiPM+AFE channels, center digital, bottom power/HV, right expansion. Sources: physics/pcb
  DESIGN_RULES.md, PART_SELECTION.md, README.md.'
