# Golden boards: human copper baseline → rip → autoroute → score.
# Fetch third_party boards: bash scripts/fetch_golden_boards.sh
# Analyze + charts: python scripts/golden_corpus_analyze.py --route-easy
#
# expect:
#   manufacturing_gate — full nets + 0 hard DRC required to pass
#   partial_ok         — 0 hard DRC; min_completion soft floor only

boards:
  # --- easy fixtures / science ---
  - id: simple_2net
    pcb: tests/fixtures/golden/simple_2net.kicad_pcb
    difficulty: easy
    expect: manufacturing_gate
    timeout_s: 60
    min_completion: 1.0
    notes: "Two 0603, SIG_A (vias) + SIG_B."

  - id: openflexure_illum
    pcb: third_party/golden/openflexure-illum/SimpleIllumination.kicad_pcb
